  <style>
    /* AXA XYZ THEME - DARK MODE & NEON GREEN */
    :root {
      --bg-dark: #0b0f19;
      --bg-card: #151b26;
      --neon-green: #00ffaa;
      --neon-glow: rgba(0, 255, 170, 0.4);
      --text-main: #f3f4f6;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      scroll-behavior: smooth;
      overflow-x: hidden;
    }

    /* Accessibility Focus States (WCAG 2.1 AA) */
    :focus-visible {
      outline: 3px solid var(--neon-green);
      outline-offset: 2px;
      border-radius: 4px;
    }

    /* CSS3 Glassmorphism Header */
    .glass-header {
      background: rgba(11, 15, 25, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(0, 255, 170, 0.15);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }

    /* Glowing Text Effect */
    .glow-text {
      text-shadow: 0 0 12px var(--neon-glow);
    }

    /* Asymmetrical Grid */
    .grid-zine {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }
    
    @media (min-width: 768px) {
      .grid-zine .zine-card:first-child { grid-column: span 2; grid-row: span 2; }
      .grid-zine .zine-card:first-child .card-img { height: 100%; min-height: 420px; }
      .grid-zine .zine-card:first-child .card-title { font-size: 2rem; line-height: 1.2; }
    }

    /* Card & Hover Animasi CSS3 */
    .zine-card {
      background: var(--bg-card);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.05);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex;
      flex-direction: column;
      text-decoration: none; /* Penting untuk tag <a> */
      content-visibility: auto; /* Performa render modern */
    }
    .zine-card:hover, .zine-card:focus-visible {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px -5px rgba(0, 255, 170, 0.2);
      border-color: rgba(0, 255, 170, 0.4);
    }
    .img-wrapper { overflow: hidden; position: relative; }
    .card-img {
      width: 100%; height: 220px; object-fit: cover;
      transition: transform 0.7s cubic-bezier(0.25, 1, 0.5, 1);
      background-color: #1f2937; /* Placeholder CLS Guard */
    }
    .zine-card:hover .card-img { transform: scale(1.1); filter: brightness(1.1); }

    /* Kategori Badge */
    .badge-category {
      background: rgba(0, 255, 170, 0.05);
      color: var(--neon-green);
      border: 1px solid rgba(0, 255, 170, 0.2);
      padding: 8px 16px; /* Touch target min 44px */
      border-radius: 24px;
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.3s ease;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .badge-category.active, .badge-category:hover, .badge-category:focus-visible {
      background: var(--neon-green);
      color: var(--bg-dark);
      box-shadow: 0 0 15px var(--neon-glow);
    }

    /* Modal Article (Smooth Transition & A11y) */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(11, 15, 25, 0.85);
      backdrop-filter: blur(10px);
      z-index: 50; display: none; opacity: 0;
      transition: opacity 0.4s ease;
      overflow-y: auto;
      overscroll-behavior: contain;
    }
    .modal-overlay.active { display: block; opacity: 1; }
    .modal-content {
      background: var(--bg-card);
      max-width: 800px;
      margin: 40px auto;
      border-radius: 24px;
      border: 1px solid rgba(0, 255, 170, 0.2);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      transform: translateY(40px) scale(0.95);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      opacity: 0;
      position: relative;
    }
    @media (max-width: 640px) {
        .modal-content {
            margin: 0;
            border-radius: 0;
            min-height: 100vh;
        }
    }
    .modal-overlay.active .modal-content {
      transform: translateY(0) scale(1);
      opacity: 1;
    }
    .article-text {
      font-family: 'Merriweather', serif; line-height: 1.8; color: #d1d5db;
    }
    
    /* Breadcrumbs Style */
    .breadcrumb-nav {
      font-size: 0.75rem;
      color: #9ca3af;
      margin-bottom: 1rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
    }
    .breadcrumb-nav span.separator {
      color: #4b5563;
    }
    .breadcrumb-nav a {
      color: var(--neon-green);
      text-decoration: none;
      transition: text-shadow 0.3s ease;
    }
    .breadcrumb-nav a:hover, .breadcrumb-nav a:focus-visible {
      text-shadow: 0 0 8px var(--neon-glow);
    }

    /* Loaders & FAB */
    .loader-ring {
      border: 3px solid rgba(255,255,255,0.05);
      border-top-color: var(--neon-green);
      border-radius: 50%; width: 44px; height: 44px;
      animation: spin 1s linear infinite; margin: 30px auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .fab-btn {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--neon-green); color: var(--bg-dark);
      width: 56px; height: 56px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px var(--neon-glow);
      cursor: pointer; opacity: 0; pointer-events: none;
      transition: all 0.3s ease; z-index: 40;
    }
    .fab-btn.visible { opacity: 1; pointer-events: auto; }
    .fab-btn:hover, .fab-btn:focus-visible { transform: translateY(-3px); box-shadow: 0 6px 25px var(--neon-glow); }
  </style>
</head>
<body>

  <!-- ENTERPRISE A11Y: Skip to Content Link -->
  <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:z-[100] focus:p-4 focus:bg-[#00ffaa] focus:text-black focus:font-bold focus:rounded-br-lg outline-none ring-2 ring-black">Langsung ke konten utama</a>

  <!-- Header (Semantic HTML5) -->
  <header class="glass-header sticky top-0 z-40 py-4 px-6 flex justify-between items-center" role="banner">
    <a href="/" class="flex items-center gap-3 cursor-pointer rounded-lg p-1 outline-none" onclick="closeModalAndGoHome(event)" aria-label="Beranda Axa Xyz">
      <img src="/axalogo.png" alt="Logo Axa Xyz" width="32" height="32" class="w-8 h-8 object-contain drop-shadow-[0_0_8px_rgba(0,255,170,0.5)]" onerror="this.style.display='none'; document.getElementById('altIcon').style.display='block';">
      <i id="altIcon" class="ph ph-hexagon text-3xl text-[#00ffaa]" style="display:none;" aria-hidden="true"></i>
      <div class="text-xl font-bold tracking-tight glow-text translate-y-[2px]">Axa <span class="text-[#00ffaa]">Xyz</span></div>

    <div class="relative hidden md:block w-64">
      <label for="searchInput" class="sr-only">Cari artikel berdasar judul</label>
      <i class="ph ph-magnifying-glass absolute left-3 top-3 text-gray-400" aria-hidden="true"></i>
      <input type="search" id="searchInput" placeholder="Cari artikel..." aria-label="Cari artikel"
             class="w-full bg-[#151b26] border border-gray-700 rounded-full py-2.5 pl-10 pr-4 text-sm text-white focus:outline-none focus:border-[#00ffaa] focus:ring-1 focus:ring-[#00ffaa] transition">
    </div>

  <!-- Main Content (Ditandai ID untuk aksesibilitas Skip Link) -->
  <main id="main-content" class="max-w-7xl mx-auto px-4 sm:px-6 py-8" role="main">
    
    <!-- Filter Navigation -->
    <nav aria-label="Filter Kategori" class="flex flex-wrap gap-3 mb-8" id="categoryContainer">
      <button class="badge-category active" aria-pressed="true" onclick="filterCategory('All', this)">Semua</button>
      <button class="badge-category" aria-pressed="false" onclick="filterCategory('Sosial', this)">Sosial</button>
      <button class="badge-category" aria-pressed="false" onclick="filterCategory('Edukasi', this)">Edukasi</button>
      <button class="badge-category" aria-pressed="false" onclick="filterCategory('Olahraga', this)">Olahraga</button>
      <button class="badge-category" aria-pressed="false" onclick="filterCategory('Event', this)">Event</button>
      <button class="badge-category" aria-pressed="false" onclick="filterCategory('Prestasi', this)">Prestasi</button>
    </nav>

    <!-- Grid Layout Artikel -->
    <div class="grid-zine" id="articleGrid" aria-live="polite">
      <!-- Injeksi JS -->

  </main>

  <!-- Modal View (100% Aksesibilitas Valid & Breadcrumbs) -->
  <div id="articleModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle" tabindex="-1">
    <article class="modal-content relative pb-8">
      <button id="closeModalBtn" onclick="closeModalAndGoHome(event)" class="absolute top-4 right-4 bg-black/60 p-3 rounded-full text-white hover:bg-[#00ffaa] hover:text-black transition z-10 backdrop-blur-sm outline-none" aria-label="Tutup Artikel">
        <i class="ph ph-x text-xl" aria-hidden="true"></i>
      </button>
      
      <figure id="modalImgWrapper" class="w-full h-64 md:h-[400px] bg-gray-900 relative m-0">
          <!-- Gambar Injeksi -->
      </figure>

      <div class="px-6 md:px-10 mt-6">
        <!-- Visual Breadcrumbs UI -->
        <nav aria-label="Breadcrumb" id="modalBreadcrumb" class="breadcrumb-nav">
           <!-- Diinjeksi via JS -->
        </nav>

        <div id="modalMeta" class="flex items-center gap-4 text-sm text-gray-400 mb-3">
          <!-- Meta Injeksi -->
        </div>
        <h1 id="modalTitle" class="text-3xl md:text-4xl font-bold mb-6 text-white leading-tight"></h1>
        
        <div class="flex gap-4 mb-8 border-b border-gray-800 pb-4">
          <button id="btnLike" onclick="likeArticle()" class="flex items-center gap-2 text-gray-400 hover:text-[#00ffaa] transition p-2 -ml-2 rounded-lg outline-none" aria-label="Sukai artikel ini">
            <i class="ph ph-heart text-xl" id="iconLike" aria-hidden="true"></i>
            <span id="txtLikeCount">0</span>
          </button>
          <button onclick="shareArticle()" class="flex items-center gap-2 text-gray-400 hover:text-[#00ffaa] transition p-2 rounded-lg outline-none" aria-label="Bagikan tautan artikel">
            <i class="ph ph-share-network text-xl" aria-hidden="true"></i> Bagikan
          </button>
        </div>

        <div id="modalContent" class="article-text text-lg md:text-xl">
          <!-- Konten Injeksi -->
        </div>
      </div>
    </article>
  </div>

  <button id="fabBtn" class="fab-btn" onclick="scrollToTop()" aria-label="Kembali ke atas halaman">
    <i class="ph ph-arrow-up text-2xl" aria-hidden="true"></i>
  </button>

  <script>
    // --- LINK GOOGLE APPS SCRIPT API ---
    const GAS_URL = "https://script.google.com/macros/s/AKfycby2bMZ4Uk1ysSsBZOMQ91-o5_JSfsYU3wr1-xO17x1DlhdjgXCtVaWmuSyqIzC4a68/exec";

    var appState = {
      articles: [], page: 1, limit: 6, category: 'All', 
      hasMore: true, isLoading: false, currentViewId: null,
      initialLoadDone: false 
    };

    // --- MOCK DATA FALLBACK ---
    var mockData = [
      { ID_Berita: "BEMFKG-01", Slug_URL: "baksos-senyum-sehat", Judul: "Baksos 'Senyum Sehat' BEM FKG UMI di Pelosok Desa", Kategori: "Sosial", Penulis: "Divisi Pengabdian", Gambar_URL: "https://images.unsplash.com/photo-1606811841689-23dfddce3e95?w=800", Konten_HTML: "<p>Kegiatan bakti sosial ini dihadiri oleh ratusan warga desa yang antusias memeriksakan kesehatan gigi dan mulut mereka. Pelayanan yang diberikan meliputi cabut gigi, tambal gigi, dan pembersihan karang gigi.</p>", Tgl_Rilis: "2026-07-20", Waktu_Baca: "3 min read", Jumlah_View: "150", Jumlah_Like: "20", Meta_Desc: "BEM FKG UMI sukses menggelar bakti sosial pemeriksaan gigi gratis..." },
      { ID_Berita: "BEMFKG-02", Slug_URL: "seminar-nasional-fkg", Judul: "Seminar Nasional: Tantangan Kedokteran Gigi Era Digital", Kategori: "Edukasi", Penulis: "Divisi Keilmuan", Gambar_URL: "https://images.unsplash.com/photo-1559839734-2b71ea197ec2?w=800", Konten_HTML: "<p>Seminar ini membahas penggunaan Artificial Intelligence (AI) dan teknologi 3D printing dalam pembuatan prostetik gigi di masa depan.</p>", Tgl_Rilis: "2026-07-18", Waktu_Baca: "2 min read", Jumlah_View: "80", Jumlah_Like: "12", Meta_Desc: "Menghadirkan pakar kedokteran gigi nasional..." }
    ];

    window.onload = function() {
      loadArticles(true);
      setupScrollListener();
      setupSearchListener();
      setupKeyboardAccessibility();
    };

    function setupKeyboardAccessibility() {
      document.addEventListener('keydown', function(event) {
        if (event.key === "Escape" && document.getElementById('articleModal').classList.contains('active')) {
          closeModalAndGoHome(event);
        }
      });
    }

    window.addEventListener('popstate', function(event) {
      checkUrlRouting(true);
    });

    function checkUrlRouting(isPopState = false) {
      const urlParams = new URLSearchParams(window.location.search);
      const articleIdOrSlug = urlParams.get('article');
      
      if (articleIdOrSlug) {
        var found = appState.articles.find(function(a) { 
          return a.ID_Berita === articleIdOrSlug || a.Slug_URL === articleIdOrSlug; 
        });
        if (found) openModal(null, found.ID_Berita, true); 
      } else if (isPopState && appState.currentViewId) {
        closeModal(true); 
      }
    }

    function loadArticles(isReset) {
      if (appState.isLoading || (!appState.hasMore && !isReset)) return;
      appState.isLoading = true;
      document.getElementById('scrollLoader').style.display = 'block';

      if (isReset) {
        appState.page = 1; appState.articles = [];
        document.getElementById('articleGrid').innerHTML = '';
      }

      var fetchUrl = GAS_URL + "?action=getArticles&page=" + appState.page + "&limit=" + appState.limit + "&category=" + encodeURIComponent(appState.category);

      fetch(fetchUrl)
        .then(function(response) {
          if (!response.ok) throw new Error("Gagal menyambung ke GAS API.");
          return response.json();
        })
        .then(function(res) {
          var parsedData = typeof res === 'string' ? JSON.parse(res) : res;
          processNewData(parsedData.data, parsedData.hasMore);
        })
        .catch(function(err) {
          console.warn("GAS API Error. Fallback ke Mock Data...", err);
          appState.isLoading = false;
          document.getElementById('scrollLoader').style.display = 'none';
          
          setTimeout(function() {
            var filtered = mockData.filter(function(i) { return appState.category === 'All' || i.Kategori === appState.category; });
            processNewData(filtered, false);
          }, 600);
        });
    }

    function processNewData(newData, hasMore) {
      appState.articles = appState.articles.concat(newData);
      appState.hasMore = hasMore; appState.page++; appState.isLoading = false;
      document.getElementById('scrollLoader').style.display = 'none';
      renderArticles(newData);

      if (!appState.initialLoadDone) {
        appState.initialLoadDone = true;
        checkUrlRouting(); 
      }
    }

    // --- EXPERT PERFORMANCE UPGRADE: LCP / EAGER LOADING UNTUK GAMBAR PERTAMA ---
    function renderArticles(data) {
      var grid = document.getElementById('articleGrid');
      var html = "";
      
      // Deteksi jika ini adalah rendering halaman pertama (index = 0)
      var currentOffset = appState.articles.length - data.length;

      for (var i = 0; i < data.length; i++) {
        var item = data[i];
        var id = String(item.ID_Berita);
        var slug = String(item.Slug_URL || id);
        var img = String(item.Gambar_URL);
        var cat = String(item.Kategori);
        var title = String(item.Judul);
        var seoUrl = "?article=" + slug;
        
        // Logika LCP (Largest Contentful Paint) 100% Core Web Vitals
        // Gambar pertama (Hero) dimuat seketika, gambar lainnya malas (lazy).
        var isHero = (currentOffset === 0 && i === 0);
        var loadingAttr = isHero ? 'loading="eager" fetchpriority="high"' : 'loading="lazy" decoding="async"';
        
        html += '<a href="' + seoUrl + '" class="zine-card cursor-pointer group outline-none" aria-label="Baca artikel: ' + title + '" onclick="openModal(event, \'' + id + '\')">';
        html +=   '<div class="img-wrapper">';
        html +=     '<img src="' + img + '" ' + loadingAttr + ' width="400" height="220" class="card-img" alt="Thumbnail ' + title + '">';
        html +=     '<div class="absolute top-3 left-3 bg-[#0b0f19]/80 text-[#00ffaa] text-xs px-3 py-1 rounded-full border border-[#00ffaa]/30 backdrop-blur-sm uppercase font-bold tracking-wider">' + cat + '</div>';
        html +=   '</div>';
        html +=   '<div class="p-5 flex-1 flex flex-col justify-between">';
        html +=     '<h2 class="card-title text-lg font-bold text-white mb-3 line-clamp-3 group-hover:text-[#00ffaa] transition">' + title + '</h2>';
        html +=     '<div class="flex justify-between items-center text-xs text-gray-400 mt-auto border-t border-gray-800 pt-3">';
        html +=       '<span class="flex items-center gap-1" aria-label="Waktu baca ' + String(item.Waktu_Baca) + '"><i class="ph ph-clock" aria-hidden="true"></i> ' + String(item.Waktu_Baca) + '</span>';
        html +=       '<span class="flex items-center gap-1" aria-label="Dilihat ' + String(item.Jumlah_View) + ' kali"><i class="ph ph-eye" aria-hidden="true"></i> <span id="viewCount-' + id + '">' + String(item.Jumlah_View) + '</span></span>';
        html +=     '</div></div></a>';
      }
      grid.innerHTML += html;
    }

    function setupSearchListener() {
      var input = document.getElementById('searchInput');
      input.addEventListener('keyup', function(e) {
        var term = e.target.value.toLowerCase();
        var cards = document.querySelectorAll('.zine-card');
        cards.forEach(function(card) {
          card.style.display = card.querySelector('.card-title').innerText.toLowerCase().indexOf(term) > -1 ? 'flex' : 'none';
        });
      });
    }

    function setupScrollListener() {
      window.addEventListener('scroll', function() {
        var fab = document.getElementById('fabBtn');
        window.scrollY > 300 ? fab.classList.add('visible') : fab.classList.remove('visible');
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 200) loadArticles(false);
      });
    }

    function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

    function filterCategory(cat, btnElement) {
      document.querySelectorAll('.badge-category').forEach(function(b) { 
        b.classList.remove('active'); 
        b.setAttribute('aria-pressed', 'false');
      });
      btnElement.classList.add('active');
      btnElement.setAttribute('aria-pressed', 'true');
      appState.category = cat; loadArticles(true);
    }

    // --- UPGRADE DYNAMIC SEO & BREADCRUMBS INJECTION 100% ---
    function openModal(event, id, skipPushState = false) {
      if (event) event.preventDefault(); 

      appState.currentViewId = id;
      var article = appState.articles.find(function(a) { return a.ID_Berita === id; });
      if (!article) return;

      var currentFullUrl = window.location.origin + window.location.pathname + '?article=' + (article.Slug_URL || id);

      if (!skipPushState) {
        window.history.pushState({ id: id }, article.Judul, currentFullUrl);
      }

      // Visual Breadcrumb Injection
      var breadcrumbHtml = '<a href="/" onclick="closeModalAndGoHome(event)" class="outline-none focus-visible:ring-1">Beranda</a> <span class="separator">/</span> ';
      breadcrumbHtml += '<span class="text-gray-400 cursor-default">' + article.Kategori + '</span> <span class="separator">/</span> ';
      breadcrumbHtml += '<span class="text-gray-200 cursor-default truncate block sm:inline max-w-[200px] sm:max-w-xs align-bottom" aria-current="page">' + article.Judul + '</span>';
      document.getElementById('modalBreadcrumb').innerHTML = breadcrumbHtml;

      document.getElementById('modalImgWrapper').innerHTML = '<img src="' + article.Gambar_URL + '" alt="' + article.Judul + '" class="w-full h-full object-cover opacity-50 mix-blend-screen"><div class="absolute inset-0 bg-gradient-to-t from-[#151b26] via-[#151b26]/50 to-transparent"></div>';
      document.getElementById('modalMeta').innerHTML = '<span class="text-[#00ffaa] font-bold uppercase tracking-wider">' + article.Kategori + '</span> &bull; <span>Oleh ' + article.Penulis + '</span> &bull; <span>' + article.Tgl_Rilis.split(" ")[0] + '</span>';
      document.getElementById('modalTitle').innerText = article.Judul;
      document.getElementById('modalContent').innerHTML = article.Konten_HTML;
      document.getElementById('txtLikeCount').innerText = article.Jumlah_Like;
      
      var iconLike = document.getElementById('iconLike');
      iconLike.classList.remove('ph-fill', 'text-red-500'); iconLike.classList.add('ph-heart');

      var modal = document.getElementById('articleModal');
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
      document.getElementById('closeModalBtn').focus(); // Aksesibilitas: Pindahkan fokus ke tombol close

      var currentView = parseInt(article.Jumlah_View) || 0;
      article.Jumlah_View = currentView + 1;
      var gridBadge = document.getElementById('viewCount-' + id);
      if (gridBadge) gridBadge.innerText = article.Jumlah_View;
      
      fetch(GAS_URL + "?action=incrementView&id=" + id, { method: 'POST', mode: 'no-cors' }).catch(function(e) {});

      // 4. BIG SEO UPGRADE: Inject Meta Canonical & Open Graph
      document.title = article.Judul + " | Axa Xyz";
      document.querySelector('meta[name="description"]').setAttribute("content", article.Meta_Desc);
      
      document.getElementById('canonicalUrl').setAttribute("href", currentFullUrl);
      document.getElementById('ogTitle').setAttribute("content", article.Judul);
      document.getElementById('ogDesc').setAttribute("content", article.Meta_Desc);
      document.getElementById('ogUrl').setAttribute("content", currentFullUrl);
      document.getElementById('ogImage').setAttribute("content", article.Gambar_URL);
      
      document.getElementById('twTitle').setAttribute("content", article.Judul);
      document.getElementById('twDesc').setAttribute("content", article.Meta_Desc);
      document.getElementById('twImage').setAttribute("content", article.Gambar_URL);

      // JSON-LD Schema Kombinasi (NewsArticle + BreadcrumbList) 100% SEO Valid
      var oldSchema = document.getElementById('dynamic-json-ld');
      if (oldSchema) oldSchema.remove();
      var scriptLD = document.createElement('script');
      scriptLD.type = 'application/ld+json';
      scriptLD.id = 'dynamic-json-ld';
      scriptLD.text = JSON.stringify([
        {
          "@context": "https://schema.org",
          "@type": "NewsArticle",
          "mainEntityOfPage": { "@type": "WebPage", "@id": currentFullUrl },
          "headline": String(article.Judul),
          "description": String(article.Meta_Desc),
          "image": [ String(article.Gambar_URL) ],
          "datePublished": String(article.Tgl_Rilis),
          "dateModified": String(article.Tgl_Rilis),
          "author": [{ "@type": "Person", "name": String(article.Penulis) }],
          "publisher": {
            "@type": "Organization",
            "name": "Axa Xyz",
            "logo": {
              "@type": "ImageObject",
              "url": "https://axaartikel.vercel.app/axalogo.png"
            }
          }
        },
        {
          "@context": "https://schema.org",
          "@type": "BreadcrumbList",
          "itemListElement": [
            { "@type": "ListItem", "position": 1, "name": "Beranda", "item": "https://axaartikel.vercel.app/" },
            { "@type": "ListItem", "position": 2, "name": String(article.Kategori), "item": "https://axaartikel.vercel.app/?category=" + encodeURIComponent(article.Kategori) },
            { "@type": "ListItem", "position": 3, "name": String(article.Judul), "item": currentFullUrl }
          ]
        }
      ]);
      document.head.appendChild(scriptLD);
    }

    function closeModal(skipPushState = false) {
      var modal = document.getElementById('articleModal');
      modal.classList.remove('active');
      document.body.style.overflow = 'auto';
      
      // Aksesibilitas: kembalikan fokus ke grid elemen asalnya
      if(appState.currentViewId) {
        var triggerElem = document.querySelector(`a[onclick*="${appState.currentViewId}"]`);
        if(triggerElem) triggerElem.focus();
      }
      
      appState.currentViewId = null;

      if (!skipPushState) {
        window.history.pushState(null, '', window.location.pathname);
      }

      // Revert Meta SEO to Default Home Axa Xyz
      document.title = "Axa Xyz E-Zine | Portal Berita Internal";
      document.querySelector('meta[name="description"]').setAttribute("content", "Portal berita kampus dan korporat internal terbaru. Informasi inovasi, teknologi, dan event terkini.");
      document.getElementById('canonicalUrl').setAttribute("href", "https://axaartikel.vercel.app/");
      document.getElementById('ogTitle').setAttribute("content", "Axa Xyz E-Zine | Portal Berita Internal");
      document.getElementById('ogDesc').setAttribute("content", "Portal berita kampus dan korporat internal terbaru.");
      document.getElementById('ogUrl').setAttribute("content", "https://axaartikel.vercel.app/");
      document.getElementById('ogImage').setAttribute("content", "https://axaartikel.vercel.app/axalogo.png");
      document.getElementById('twTitle').setAttribute("content", "Axa Xyz E-Zine");
      document.getElementById('twDesc').setAttribute("content", "Portal berita kampus dan korporat internal terbaru.");
      document.getElementById('twImage').setAttribute("content", "https://axaartikel.vercel.app/axalogo.png");
      
      var oldSchema = document.getElementById('dynamic-json-ld');
      if (oldSchema) oldSchema.remove();
    }

    function closeModalAndGoHome(event) {
      if (event) event.preventDefault();
      closeModal();
      scrollToTop();
    }

    function likeArticle() {
      var id = appState.currentViewId;
      var article = appState.articles.find(function(a) { return a.ID_Berita === id; });
      if (!article) return;
      var iconLike = document.getElementById('iconLike');
      if (iconLike.classList.contains('ph-fill')) return; 

      iconLike.classList.remove('ph-heart');
      iconLike.classList.add('ph-fill', 'text-red-500');
      article.Jumlah_Like = (parseInt(article.Jumlah_Like) || 0) + 1;
      document.getElementById('txtLikeCount').innerText = article.Jumlah_Like;

      fetch(GAS_URL + "?action=incrementLike&id=" + id, { method: 'POST', mode: 'no-cors' }).catch(function(e){});
    }

    function shareArticle() {
      var dummy = document.createElement('input');
      document.body.appendChild(dummy);
      dummy.value = window.location.href; 
      dummy.select();
      document.execCommand('copy');
      document.body.removeChild(dummy);
      alert("Tautan artikel berhasil disalin: \n" + dummy.value);
    }
  </script>
</body>
</html>
